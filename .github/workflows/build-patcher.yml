name: Build Patcher EXE

# 패처 코드(patcher.py)가 바뀔 때만 수동으로 실행!
# 번역 데이터만 올릴 때는 실행하지 않음.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'exe를 첨부할 릴리즈 tag (예: v0.4.1)'
        required: true

permissions:
  contents: write

jobs:
  build-patcher:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller detools certifi

      - name: Build EXE
        run: |
          cd patcher
          pyinstaller --onefile --windowed --name "LastEpoch_KR_Patcher" --hidden-import certifi --collect-data certifi --clean patcher.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: patcher/dist/LastEpoch_KR_Patcher.exe
